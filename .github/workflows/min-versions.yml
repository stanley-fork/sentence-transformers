name: Minimum version tests

on:
  push:
    branches:
      - main
      - "*-release"
  pull_request:
    branches:
      - main
      - "*-release"
    paths:
      - "pyproject.toml"
      - "sentence_transformers/**"
      - ".github/workflows/min-versions.yml"
  workflow_dispatch:

env:
  TRANSFORMERS_IS_CI: 1
  HF_HUB_DISABLE_PROGRESS_BARS: 1

jobs:
  test_min_versions:
    name: Test minimum dependency versions
    runs-on: ubuntu-latest
    steps:
      - name: Remove unnecessary files
        run: |
          sudo rm -rf \
            "$AGENT_TOOLSDIRECTORY" \
            /opt/google/chrome \
            /opt/microsoft/msedge \
            /opt/microsoft/powershell \
            /opt/pipx \
            /usr/lib/mono \
            /usr/local/julia* \
            /usr/local/lib/android \
            /usr/local/lib/node_modules \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /usr/share/swift

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install with minimum versions
        run: uv pip install '.[train, dev]' --resolution lowest-direct --system

      - name: Show installed versions
        run: uv pip list --system | grep -iE 'transformers|huggingface|torch|numpy|scikit|scipy|typing.ext|tqdm|accelerate'

      - name: Run unit tests
        run: python -m pytest --durations 20 -sv tests/
